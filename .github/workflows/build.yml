name: Cloud APK Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Initialize Java Development Kit 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Install Missing Gradle Wrapper Files
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
          generate-submit-architecture-generate: true

      - name: Execute Production Debug Compilation
        run: gradle :app:assembleDebug

      - name: Export Compiled Artifact APK
        uses: actions/upload-artifact@v4
        with:
          name: LaT-AI-App
          path: app/build/outputs/apk/debug/app-debug.apk
